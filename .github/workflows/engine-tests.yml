name: Engine tests

on:
  push:
    paths:
      - "backend/engine/**"
      - "backend/scripts/**"
      - ".github/workflows/engine-tests.yml"
  pull_request:
    paths:
      - "backend/engine/**"
      - "backend/scripts/**"
      - ".github/workflows/engine-tests.yml"

jobs:
  pytest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytest
      # Includes tests/test_golden_ay2026_27.py — hand-derived AY 2026-27
      # golden scenarios (families A/B). These pin the LAW, not the engine:
      # do not update expected values without a ruleset version bump.
      - run: pytest tests/ -q
      - run: python tests.py
