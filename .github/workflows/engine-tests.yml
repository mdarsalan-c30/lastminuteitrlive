name: Engine tests

on:
  push:
    paths:
      - "engine/**"
      - "scripts/**"
  pull_request:
    paths:
      - "engine/**"
      - "scripts/**"

jobs:
  pytest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytest
      - run: pytest tests/ -q
      - run: python tests.py
