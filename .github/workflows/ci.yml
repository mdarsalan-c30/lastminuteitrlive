name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - run: npm run test

      - run: npm run build

      - run: npx playwright install --with-deps chromium

      - run: npm run test:e2e
        env:
          CI: "true"

  engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run pytest
        working-directory: engine
        run: |
          pip install pytest
          pytest tests/ -q

      - name: Run legacy engine tests
        working-directory: engine
        run: python tests.py
