<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LastMinute ITR Companion</title>
    <style>
      body {
        width: 300px;
        margin: 0;
        padding: 16px;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #0f172a;
      }
      label {
        display: block;
        margin-bottom: 6px;
        font-size: 12px;
        font-weight: 700;
      }
      input {
        box-sizing: border-box;
        width: 100%;
        border: 1px solid #cbd5e1;
        border-radius: 10px;
        padding: 10px;
      }
      button {
        width: 100%;
        margin-top: 12px;
        border: 0;
        border-radius: 10px;
        background: #0e5f63;
        color: white;
        padding: 10px;
        font-weight: 700;
        cursor: pointer;
      }
      p {
        margin: 10px 0 0;
        font-size: 12px;
        color: #475569;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <label for="field-label">Portal field label</label>
    <input id="field-label" placeholder="Example: Gross Salary" />
    <button id="highlight">Highlight on portal</button>
    <p id="status">Open incometax.gov.in, then enter the field name from LastMinute ITR.</p>
    <script src="popup.js"></script>
  </body>
</html>
